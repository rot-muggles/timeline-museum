<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理后台 · 时间线博物馆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0d; --surface: #111115; --elevated: #18181d;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --text: #e8e6df; --text2: #8b8b82; --text3: #5c5c56;
    --accent: #d4a574; --accent2: #c47a8b; --danger: #c45353;
    --r: 12px; --font: 'Noto Sans SC', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; }

  /* Sidebar */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 24px 0;
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
  }
  .sidebar-logo { padding: 0 20px 24px; font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; }
  .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
  .sidebar-nav a {
    display: block; padding: 10px 14px; border-radius: 8px;
    font-size: 0.85rem; font-weight: 480; color: var(--text2);
    transition: 0.15s; cursor: pointer;
  }
  .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--elevated); color: var(--text); }
  .sidebar-footer { padding: 16px 20px 0; border-top: 1px solid var(--border); margin-top: 16px; }
  .sidebar-footer a { display: block; padding: 8px 0; font-size: 0.8rem; color: var(--text2); transition: 0.15s; }
  .sidebar-footer a:hover { color: var(--text); }
  .sidebar-footer .logout { color: var(--danger); }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 36px 40px; max-width: 1100px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 24px; letter-spacing: -0.01em; }

  /* Toolbar */
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .toolbar input { padding: 9px 14px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.85rem; font-family: inherit; outline: none; transition: 0.15s; }
  .toolbar input:focus { border-color: var(--border-hover); }
  .toolbar select { padding: 9px 14px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.85rem; font-family: inherit; outline: none; cursor: pointer; }

  /* Buttons */
  .btn {
    padding: 9px 20px; border-radius: var(--r); font-size: 0.85rem; font-weight: 520;
    font-family: inherit; border: none; cursor: pointer; transition: 0.15s;
    letter-spacing: 0.01em; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: linear-gradient(120deg, var(--accent), var(--accent2)); color: #1a1a16; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface); }
  .btn-danger { background: transparent; border: 1px solid rgba(196,83,83,0.3); color: var(--danger); }
  .btn-danger:hover { background: rgba(196,83,83,0.1); border-color: rgba(196,83,83,0.5); }
  .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 8px; }

  /* Event list */
  .event-list { display: flex; flex-direction: column; gap: 6px; }
  .event-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: var(--r);
    background: var(--surface); border: 1px solid var(--border);
    transition: 0.15s;
  }
  .event-item:hover { border-color: var(--border-hover); }
  .event-item .ei-id { font-family: var(--mono); font-size: 0.75rem; color: var(--text3); min-width: 30px; }
  .event-item .ei-date { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); min-width: 100px; }
  .event-item .ei-title { flex: 1; font-size: 0.88rem; font-weight: 500; }
  .event-item .ei-cat {
    font-size: 0.72rem; padding: 3px 10px; border-radius: 50px;
    background: var(--elevated); color: var(--text2);
  }
  .event-item .ei-featured { font-size: 0.7rem; color: var(--accent); }
  .event-item .ei-actions { display: flex; gap: 6px; }

  /* Forms */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.02em; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border-radius: var(--r);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 0.88rem; font-family: inherit; outline: none;
    transition: 0.15s; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--border-hover); }
  .form-group textarea { min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-hint { font-size: 0.72rem; color: var(--text3); margin-top: 4px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 600px; max-width: 94vw;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 2000;
    padding: 12px 24px; border-radius: var(--r);
    background: var(--elevated); border: 1px solid var(--border);
    font-size: 0.85rem; opacity: 0; transform: translateY(12px);
    transition: 0.25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(0,200,100,0.3); color: #4caf90; }
  .toast.error { border-color: rgba(200,80,80,0.3); color: #c47070; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--r);
    padding: 32px; text-align: center; cursor: pointer;
    transition: 0.15s; color: var(--text2);
  }
  .upload-zone:hover { border-color: var(--border-hover); color: var(--text); }
  .upload-zone.drag { border-color: var(--accent); background: rgba(212,165,116,0.05); }
  .upload-result { margin-top: 10px; font-family: var(--mono); font-size: 0.78rem; color: var(--accent); word-break: break-all; }

  /* Responsive */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 0; height: auto; position: sticky; top: 0; z-index: 100;
      flex-direction: row; flex-wrap: wrap; padding: 10px 12px; gap: 6px;
      align-items: center; overflow-x: auto;
    }
    .sidebar-logo { padding: 0; font-size: 0.9rem; white-space: nowrap; }
    .sidebar-nav { flex-direction: row; padding: 0; gap: 2px; flex: 0; }
    .sidebar-nav a { padding: 5px 8px; font-size: 0.72rem; white-space: nowrap; }
    .sidebar-footer { border: none; margin: 0; padding: 0; display: flex; gap: 8px; margin-left: auto; }
    .sidebar-footer a { font-size: 0.72rem; padding: 4px 0; }

    .main { padding: 16px 12px; }
    .panel h2 { font-size: 1.1rem; margin-bottom: 16px; }

    /* Toolbar */
    .toolbar { gap: 6px; }
    .toolbar input { width: 100% !important; }
    .toolbar select { font-size: 0.78rem; }

    /* Event list */
    .event-item { flex-wrap: wrap; gap: 6px; padding: 10px 12px; }
    .event-item .ei-date { min-width: 0; font-size: 0.7rem; }
    .event-item .ei-title { font-size: 0.8rem; flex: 1 1 100%; }
    .event-item .ei-actions { width: 100%; justify-content: flex-end; }

    /* Forms */
    .form-row { grid-template-columns: 1fr; }
    .form-group input, .form-group textarea, .form-group select { font-size: 0.82rem; padding: 8px 12px; }

    /* Modal */
    .modal { width: 96vw; padding: 20px 16px; border-radius: 14px; }
    .modal h3 { font-size: 1rem; margin-bottom: 16px; }
    .modal-actions { flex-wrap: wrap; gap: 8px; }

    /* Upload */
    .upload-zone { padding: 20px 12px; }

    /* Buttons */
    .btn { padding: 8px 14px; font-size: 0.8rem; }
  }
  @media (max-width: 400px) {
    .sidebar { padding: 8px 10px; }
    .sidebar-nav a { padding: 4px 6px; font-size: 0.68rem; }
    .sidebar-footer a { font-size: 0.68rem; }
    .sidebar-logo { font-size: 0.8rem; }
    .btn { padding: 7px 12px; font-size: 0.75rem; }
    .ei-id { display: none; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">🔐 管理后台</div>
  <nav class="sidebar-nav">
    <a data-panel="events" class="active">📅 事件管理</a>
    <a data-panel="profile">👤 个人资料</a>
    <a data-panel="settings">⚙️ 网站设置</a>
    <a data-panel="upload">📷 图片上传</a>
    <a data-panel="password">🔑 修改密码</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/" target="_blank">↗ 查看前台</a>
    <a href="#" class="logout" id="logout-btn">退出登录</a>
  </div>
</aside>

<!-- Main Content -->
<main class="main">

  <!-- Panel: Events -->
  <section class="panel active" id="panel-events">
    <h2>📅 事件管理 <span style="font-weight:400;font-size:0.8rem;color:var(--text3);margin-left:8px;" id="event-count"></span></h2>
    <div class="toolbar">
      <input type="text" id="event-search" placeholder="搜索事件..." style="width:220px;">
      <select id="event-cat-filter">
        <option value="all">全部分类</option>
        <option value="life">人生</option>
        <option value="education">学业</option>
        <option value="project">项目</option>
        <option value="travel">旅行</option>
        <option value="achievement">成就</option>
      </select>
      <button class="btn btn-primary" id="btn-add-event">+ 添加事件</button>
    </div>
    <div class="event-list" id="event-list"></div>
  </section>

  <!-- Panel: Profile -->
  <section class="panel" id="panel-profile">
    <h2>👤 个人资料</h2>
    <form id="profile-form">
      <div class="form-row">
        <div class="form-group"><label>姓名</label><input name="name" required maxlength="100"></div>
        <div class="form-group"><label>简介</label><input name="bio" maxlength="200"></div>
      </div>
      <div class="form-group"><label>头像图片 URL</label><input name="avatar" maxlength="500" placeholder="/static/uploads/avatar.jpg"><p class="form-hint">可先在上传面板上传图片，再粘贴 URL</p></div>
      <div class="form-row">
        <div class="form-group"><label>GitHub</label><input name="github" maxlength="500" placeholder="https://github.com/xxx"></div>
        <div class="form-group"><label>博客</label><input name="blog" maxlength="500" placeholder="https://xxx.com"></div>
      </div>
      <div class="form-group"><label>邮箱</label><input name="email" type="email" maxlength="200"></div>
      <button type="submit" class="btn btn-primary">保存资料</button>
    </form>
  </section>

  <!-- Panel: Site Settings -->
  <section class="panel" id="panel-settings">
    <h2>⚙️ 网站设置</h2>
    <form id="site-form">
      <div class="form-group"><label>页脚引用语</label><input name="footer_quote" maxlength="500"></div>
      <div class="form-group"><label>页脚版权信息</label><input name="footer_copy" maxlength="200"></div>
      <div class="form-group"><label>Hero 滚动提示文字</label><input name="hero_scroll_hint" maxlength="200"></div>
      <button type="submit" class="btn btn-primary">保存设置</button>
    </form>
  </section>

  <!-- Panel: Photo Upload -->
  <section class="panel" id="panel-upload">
    <h2>📷 图片上传</h2>
    <div class="upload-zone" id="upload-zone">
      <p style="margin-bottom:8px;">拖拽图片到此处，或点击选择</p>
      <p style="font-size:0.78rem;color:var(--text3);">支持 JPG / PNG / GIF / WebP / SVG，最大 10MB</p>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>
    <div class="upload-result" id="upload-result"></div>
  </section>

  <!-- Panel: Change Password -->
  <section class="panel" id="panel-password">
    <h2>🔑 修改密码</h2>
    <form id="password-form" style="max-width:400px;">
      <div class="form-group"><label>旧密码</label><input type="password" name="old_password" required minlength="1"></div>
      <div class="form-group"><label>新密码</label><input type="password" name="new_password" required minlength="6" maxlength="128"></div>
      <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
  </section>

</main>

<!-- Event Edit Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <h3 id="modal-title">添加事件</h3>
    <form id="event-form">
      <input type="hidden" name="id" id="ev-id">
      <div class="form-row">
        <div class="form-group"><label>日期 *</label><input type="date" name="date" id="ev-date" required></div>
        <div class="form-group"><label>分类 *</label>
          <select name="category" id="ev-category">
            <option value="life">人生</option><option value="education">学业</option>
            <option value="project">项目</option><option value="travel">旅行</option>
            <option value="achievement">成就</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>标题 *</label><input name="title" id="ev-title" required maxlength="200"></div>
      <div class="form-group"><label>描述</label><textarea name="description" id="ev-description" maxlength="2000" rows="3"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>地点</label><input name="location" id="ev-location" maxlength="200"></div>
        <div class="form-group"><label>图标</label>
          <select name="icon" id="ev-icon">
            <option value="star">⭐ 星</option><option value="baby">👶 婴儿</option><option value="school">🏫 学校</option>
            <option value="code">💻 代码</option><option value="celebration">🎉 庆祝</option><option value="plane">✈️ 飞机</option>
            <option value="trophy">🏆 奖杯</option><option value="globe">🌍 地球</option><option value="laptop">💻 笔记本</option>
            <option value="github">🐙 GitHub</option><option value="bike">🚴 骑行</option><option value="briefcase">💼 工作</option>
            <option value="users">👥 团队</option><option value="mountain">🏔️ 山</option><option value="pen">✍️ 笔</option><option value="robot">🤖 机器人</option><option value="heart">❤️ 心</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>标签 (逗号分隔)</label><input name="tags" id="ev-tags" maxlength="500" placeholder="编程, Python, 开源"></div>
        <div class="form-group"><label>图片 URL</label><input name="image" id="ev-image" maxlength="500" placeholder="/static/uploads/xxx.jpg"></div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" name="featured" id="ev-featured" style="width:auto;"> 标记为精选事件
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="btn-modal-cancel">取消</button>
        <button type="submit" class="btn btn-primary" id="btn-modal-save">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// 状态管理：所有数据在内存中维护，CRUD后重新加载
// ═══════════════════════════════════════════════
let allEvents = [];
let profile = {};
let siteSettings = {};

// ── Panel switching ──
document.querySelectorAll('.sidebar-nav a').forEach(link => {
  link.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + link.dataset.panel).classList.add('active');
  });
});

// ── Toast ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Load all data ──
async function loadAll() {
  try {
    const [evRes, siteRes] = await Promise.all([
      fetch('/api/admin/events'), fetch('/api/site')
    ]);
    const evData = await evRes.json();
    allEvents = evData.events;
    profile = evData.profile;
    siteSettings = await siteRes.json();
    renderEvents();
    fillProfileForm();
    fillSiteForm();
  } catch (e) { showToast('加载数据失败: ' + e.message, 'error'); }
}

// ── Render events ──
function renderEvents(filter='', cat='all') {
  const list = document.getElementById('event-list');
  const search = (filter || document.getElementById('event-search').value).toLowerCase();
  const category = cat || document.getElementById('event-cat-filter').value;

  // 确保按日期排序后再展示
  allEvents.sort((a, b) => a.date.localeCompare(b.date));

  let filtered = allEvents;
  if (search) filtered = filtered.filter(e =>
    e.title.toLowerCase().includes(search) ||
    e.description.toLowerCase().includes(search) ||
    e.tags.some(t => t.toLowerCase().includes(search))
  );
  if (category !== 'all') filtered = filtered.filter(e => e.category === category);

  document.getElementById('event-count').textContent = `共 ${filtered.length} 条`;

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);">没有匹配的事件</div>';
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="event-item">
      <span class="ei-id">#${e.id}</span>
      <span class="ei-date">${e.date}</span>
      <span class="ei-title">${esc(e.title)}</span>
      <span class="ei-cat">${e.category}</span>
      ${e.featured ? '<span class="ei-featured">✦</span>' : ''}
      <span class="ei-actions">
        <button class="btn btn-outline btn-sm" onclick="editEvent(${e.id})">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteEvent(${e.id})">删除</button>
      </span>
    </div>
  `).join('');
}

document.getElementById('event-search').addEventListener('input', () => renderEvents());
document.getElementById('event-cat-filter').addEventListener('change', () => renderEvents());

// ── Event CRUD ──
function openModal(title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('event-modal').classList.add('open');
}
function closeModal() { document.getElementById('event-modal').classList.remove('open'); }
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('event-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('btn-add-event').addEventListener('click', () => {
  document.getElementById('event-form').reset();
  document.getElementById('ev-id').value = '';
  document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
  openModal('添加事件');
});

function editEvent(id) {
  const e = allEvents.find(ev => ev.id === id);
  if (!e) return;
  document.getElementById('ev-id').value = e.id;
  document.getElementById('ev-date').value = e.date;
  document.getElementById('ev-category').value = e.category;
  document.getElementById('ev-title').value = e.title;
  document.getElementById('ev-description').value = e.description;
  document.getElementById('ev-location').value = e.location || '';
  document.getElementById('ev-icon').value = e.icon || 'star';
  document.getElementById('ev-tags').value = (e.tags || []).join(', ');
  document.getElementById('ev-image').value = e.image || '';
  document.getElementById('ev-featured').checked = e.featured;
  openModal('编辑事件 #' + e.id);
}

async function deleteEvent(id) {
  if (!confirm('确定删除事件 #' + id + '？此操作不可恢复。')) return;
  try {
    const res = await fetch('/api/admin/events/' + id, { method: 'DELETE' });
    if (res.ok) { showToast('事件已删除'); loadAll(); }
    else { const d = await res.json(); showToast(d.detail || '删除失败', 'error'); }
  } catch (e) { showToast('网络错误', 'error'); }
}

document.getElementById('event-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = new FormData(this);
  const id = form.get('id');
  const method = id ? 'PUT' : 'POST';
  const url = id ? '/api/admin/events/' + id : '/api/admin/events';

  try {
    const res = await fetch(url, { method, body: form });
    const data = await res.json();
    if (res.ok) {
      showToast(id ? '事件已更新' : '事件已创建');
      closeModal();
      loadAll();
    } else {
      showToast(data.detail || '保存失败', 'error');
    }
  } catch (ex) { showToast('网络错误', 'error'); }
});

// ── Photo Upload ──
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const uploadResult = document.getElementById('upload-result');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => uploadFile(fileInput.files[0]));

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

async function uploadFile(file) {
  if (!file) return;
  // 前端校验：10MB上限（后端也会校验，双重保障）
  if (file.size > 10 * 1024 * 1024) { showToast('文件不能超过 10MB', 'error'); return; }
  const form = new FormData();
  form.append('file', file);

  uploadResult.textContent = '上传中...';
  try {
    const res = await fetch('/api/admin/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok) {
      uploadResult.innerHTML = `✅ 上传成功！<br>URL: <code>${esc(data.url)}</code><br><button class="btn btn-sm btn-outline" onclick="navigator.clipboard.writeText('${esc(data.url)}').then(()=>showToast('已复制'))" style="margin-top:8px;">📋 复制 URL</button>`;
      showToast('图片上传成功');
    } else {
      uploadResult.textContent = '❌ ' + (data.detail || '上传失败');
      showToast(data.detail || '上传失败', 'error');
    }
  } catch (ex) { uploadResult.textContent = '❌ 网络错误'; }
}

  d.textContent = s;

}
